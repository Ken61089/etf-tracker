name: 每日更新 ETF 持股

on:
  schedule:
    # GitHub 用 UTC 時間；台灣 18:00 = UTC 10:00
    - cron: '0 10 * * *'
  workflow_dispatch:        # 允許在 GitHub 網頁手動按按鈕觸發

permissions:
  contents: write           # 需要把更新後的資料寫回 repo

concurrency:                # 避免重疊執行
  group: etf-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼（含過去的快照）
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取最新持股並產生儀表板
        run: python3 etf_tracker.py

      - name: 將更新結果寫回 repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --staged --quiet; then
            echo "沒有變化，跳過 commit"
          else
            git commit -m "每日更新 ETF 持股 ($(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M'))"
            git push
          fi
