name: 每日更新 ETF 持股

on:
  schedule:
    # GitHub 排程是 UTC。台灣 18:00 起每小時跑一次，直到各檔都更新到當日為止
    # （任務具冪等性：已是當日資料就不再存、不再 commit，等於自動停）。
    # UTC 10:00–17:00 = 台灣 18:00–隔日 01:00，共 8 個時段。
    - cron: '0 10 * * *'   # 台灣 18:00
    - cron: '0 11 * * *'   # 台灣 19:00
    - cron: '0 12 * * *'   # 台灣 20:00
    - cron: '0 13 * * *'   # 台灣 21:00
    - cron: '0 14 * * *'   # 台灣 22:00
    - cron: '0 15 * * *'   # 台灣 23:00
    - cron: '0 16 * * *'   # 台灣 00:00（隔日）
    - cron: '0 17 * * *'   # 台灣 01:00（隔日）
  workflow_dispatch:        # 需要更快時可在 Actions 頁手動按 Run workflow

permissions:
  contents: write           # 需要把更新後的資料寫回 repo

concurrency:                # 避免多個執行同時跑造成衝突
  group: etf-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼（含過去的快照）
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取最新持股並產生儀表板
        run: python3 etf_tracker.py

      - name: 將更新結果寫回 repo（持股有變化才提交，push 失敗自動重試）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs
          # 只有當持股快照 data/ 真的有變化才提交；避免每次跑只改時間戳就產生 commit
          if git diff --staged --quiet -- data; then
            echo "持股資料無變化（MoneyDJ 資料日期未更新），跳過。"
            exit 0
          fi
          git commit -m "每日更新 ETF 持股 ($(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M'))"
          # push 可能因其他執行剛好寫入而被拒；rebase 後重試最多 5 次
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "已推送 ✅"
              exit 0
            fi
            echo "push 被拒，與遠端同步後重試（第 $i 次）..."
            git pull --rebase -X theirs origin main || true
            sleep 5
          done
          echo "重試多次後仍推送失敗 ❌"
          exit 1
